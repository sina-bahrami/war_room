apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor
  namespace: prompcorp-tender-intelligence
  labels:
    app.kubernetes.io/name: prompcorp-tender-intelligence
    app.kubernetes.io/component: ingestor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prompcorp-tender-intelligence
      app.kubernetes.io/component: ingestor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prompcorp-tender-intelligence
        app.kubernetes.io/component: ingestor
    spec:
      containers:
        - name: ingestor
          image: prompcorp-backend:local
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - ingestion.main
            - --loop
          envFrom:
            - configMapRef:
                name: prompcorp-platform-config
            - secretRef:
                name: prompcorp-platform-secrets
          volumeMounts:
            - name: project-root
              mountPath: /project-root
              readOnly: true
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep -f "python -m ingestion.main --loop" >/dev/null
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: project-root
          hostPath:
            path: /var/snap/microk8s/common/prompcorp-tender-intelligence
            type: DirectoryOrCreate
