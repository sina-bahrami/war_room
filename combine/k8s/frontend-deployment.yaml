apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: prompcorp-tender-intelligence
  labels:
    app.kubernetes.io/name: prompcorp-tender-intelligence
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prompcorp-tender-intelligence
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prompcorp-tender-intelligence
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: prompcorp-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
