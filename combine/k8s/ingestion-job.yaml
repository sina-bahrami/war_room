apiVersion: batch/v1
kind: Job
metadata:
  name: ingestor-once
  namespace: prompcorp-tender-intelligence
  labels:
    app.kubernetes.io/name: prompcorp-tender-intelligence
    app.kubernetes.io/component: ingestor-job
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prompcorp-tender-intelligence
        app.kubernetes.io/component: ingestor-job
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ingestor-once
          image: prompcorp-backend:local
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - ingestion.main
            - --once
          envFrom:
            - configMapRef:
                name: prompcorp-platform-config
            - secretRef:
                name: prompcorp-platform-secrets
          volumeMounts:
            - name: project-root
              mountPath: /project-root
              readOnly: true
      volumes:
        - name: project-root
          hostPath:
            path: /var/snap/microk8s/common/prompcorp-tender-intelligence
            type: DirectoryOrCreate
